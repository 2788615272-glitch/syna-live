<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Syna Live</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="/assets/syna-normal.png" alt="Syna">
        <div><strong>Syna Live</strong><span>Companion Studio</span></div>
      </div>
      <nav class="nav" aria-label="主导航">
        <button class="nav-item active" data-view="studio"><i data-lucide="message-circle"></i><span>陪伴台</span></button>
        <button class="nav-item" data-view="character"><i data-lucide="user-round-cog"></i><span>角色人设</span></button>
        <button class="nav-item" data-view="provider"><i data-lucide="brain-circuit"></i><span>模型连接</span></button>
        <button class="nav-item" data-view="voice"><i data-lucide="audio-lines"></i><span>语音</span></button>
        <button class="nav-item" data-view="live"><i data-lucide="radio"></i><span>直播</span></button>
        <button class="nav-item" data-view="privacy"><i data-lucide="shield-check"></i><span>隐私与数据</span></button>
      </nav>
      <div class="sidebar-status">
        <span class="status-dot" id="readyDot"></span>
        <div><strong id="readyLabel">正在检查</strong><span id="versionLabel">Syna Live</span></div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div><h1 id="viewTitle">陪伴台</h1><p id="viewSubtitle">和你的角色实时对话</p></div>
        <div class="top-actions">
          <button class="icon-button" id="refreshBtn" title="刷新状态" aria-label="刷新状态"><i data-lucide="refresh-cw"></i></button>
          <button class="button primary" id="globalSaveBtn"><i data-lucide="save"></i><span>保存</span></button>
        </div>
      </header>

      <section class="view active" id="view-studio">
        <div class="studio-grid">
          <section class="chat-panel panel">
            <div class="panel-heading">
              <div><h2 id="chatCharacterName">Syna</h2><span id="chatStatus">本地会话</span></div>
              <button class="icon-button" id="clearChatBtn" title="清空对话" aria-label="清空对话"><i data-lucide="trash-2"></i></button>
            </div>
            <div class="messages" id="messages" aria-live="polite"></div>
            <form class="composer" id="chatForm">
              <button class="icon-button" type="button" id="micBtn" title="语音输入" aria-label="语音输入"><i data-lucide="mic"></i></button>
              <textarea id="chatInput" rows="1" maxlength="4000" placeholder="说点什么…"></textarea>
              <button class="send-button" type="submit" id="sendBtn" title="发送" aria-label="发送"><i data-lucide="send"></i></button>
            </form>
          </section>

          <section class="stage-panel panel">
            <div class="panel-heading">
              <div><h2>舞台预览</h2><span id="stageStatus">OBS 同步</span></div>
              <button class="icon-button" id="openStageBtn" title="打开舞台" aria-label="打开舞台"><i data-lucide="external-link"></i></button>
            </div>
            <div class="stage-preview">
              <div class="stage-grid-lines"></div>
              <img id="stageAvatar" src="/assets/syna-normal.png" alt="角色舞台预览">
              <div class="preview-subtitle" id="stageSubtitle">准备好后，和 Syna 说句话吧。</div>
            </div>
            <div class="quick-status">
              <div><span>模型</span><strong id="quickProvider">未配置</strong></div>
              <div><span>语音</span><strong id="quickVoice">开启</strong></div>
              <div><span>直播间</span><strong id="quickLive">未连接</strong></div>
            </div>
            <button class="button primary companion-launch" id="openCompanionBtn"><i data-lucide="picture-in-picture-2"></i><span>弹出桌面陪伴立绘</span></button>
          </section>
        </div>
      </section>

      <section class="view" id="view-character">
        <div class="settings-layout">
          <section class="form-section">
            <div class="section-heading"><h2>身份</h2><span>公开人设与用户关系</span></div>
            <div class="form-grid two">
              <label><span>角色名</span><input id="characterName" maxlength="40"></label>
              <label><span>用户称呼</span><input id="userName" maxlength="40"></label>
            </div>
            <label><span>关系</span><input id="relationship" maxlength="120"></label>
            <label><span>核心性格</span><textarea id="personality" rows="5"></textarea></label>
            <label><span>表达方式</span><textarea id="speakingStyle" rows="4"></textarea></label>
            <label><span>相处边界</span><textarea id="boundaries" rows="4"></textarea></label>
          </section>
          <section class="avatar-section panel">
            <div class="avatar-canvas"><img id="characterAvatar" src="/assets/syna-normal.png" alt="角色立绘"></div>
            <div class="expression-manager" id="expressionManager" aria-label="表情立绘管理"></div>
            <small class="expression-help">点击表情即可预览；每个表情都能单独替换，图片只保存在本机。</small>
            <div class="avatar-actions">
              <label class="button secondary file-button"><i data-lucide="image-up"></i><span>静态立绘</span><input id="avatarFile" type="file" accept="image/png,image/jpeg,image/webp"></label>
              <label class="button secondary file-button"><i data-lucide="audio-waveform"></i><span>说话立绘</span><input id="talkingAvatarFile" type="file" accept="image/png,image/jpeg,image/webp"></label>
            </div>
            <label><span>立绘缩放</span><input id="avatarScale" type="range" min="0.5" max="1.8" step="0.05"></label>
          </section>
        </div>
      </section>

      <section class="view" id="view-provider">
        <section class="form-section narrow">
          <div class="section-heading"><h2>模型供应商</h2><span id="keyState" class="badge">未配置 Key</span></div>
          <label><span>供应商</span><select id="providerId"></select></label>
          <div class="provider-links">
            <span class="badge recommended" id="providerRecommended">推荐</span>
            <a id="providerKeyLink" href="#" target="_blank" rel="noreferrer">获取 API Key <i data-lucide="arrow-up-right"></i></a>
            <a id="providerDocsLink" href="#" target="_blank" rel="noreferrer">查看模型与计费 <i data-lucide="arrow-up-right"></i></a>
          </div>
          <label><span>接口地址</span><input id="providerBaseUrl" type="url" autocomplete="off"></label>
          <label><span>模型 ID</span><input id="providerModel" autocomplete="off"><small id="modelHint"></small></label>
          <label><span>API Key</span><input id="providerApiKey" type="password" autocomplete="new-password" placeholder="只保存在本机系统凭据库"></label>
          <label><span>角色温度</span><input id="temperature" type="range" min="0" max="2" step="0.1"><output id="temperatureValue">0.9</output><small id="temperatureHint"></small></label>
          <div class="form-actions">
            <button class="button secondary" id="clearKeyBtn"><i data-lucide="key-round"></i><span>清除 Key</span></button>
            <button class="button primary" id="testProviderBtn"><i data-lucide="plug-zap"></i><span>测试连接</span></button>
          </div>
        </section>
      </section>

      <section class="view" id="view-voice">
        <section class="form-section narrow">
          <div class="section-heading"><h2>语音输出</h2><label class="switch"><input id="voiceEnabled" type="checkbox"><span></span></label></div>
          <label><span>语言</span><select id="voiceLanguage"><option value="zh-CN">中文（普通话）</option><option value="zh-TW">中文（台湾）</option><option value="ja-JP">日语</option><option value="en-US">英语</option></select></label>
          <label><span>语速</span><input id="voiceRate" type="range" min="0.5" max="2" step="0.05"><output id="voiceRateValue">1.00</output></label>
          <label><span>音调</span><input id="voicePitch" type="range" min="0.5" max="2" step="0.05"><output id="voicePitchValue">1.00</output></label>
          <button class="button secondary" id="testVoiceBtn"><i data-lucide="volume-2"></i><span>试听 Syna</span></button>
        </section>
      </section>

      <section class="view" id="view-live">
        <div class="live-grid">
          <section class="form-section">
            <div class="section-heading"><h2>B 站直播间</h2><span class="status-pill" id="liveStatus">未连接</span></div>
            <label><span>直播间号</span><input id="liveRoomId" inputmode="numeric" autocomplete="off"></label>
            <label class="check-row"><span><strong>弹幕自动回复</strong><small>将观众弹幕交给当前角色回应</small></span><input id="liveAutoReply" type="checkbox"></label>
            <div class="form-actions">
              <button class="button secondary" id="disconnectLiveBtn"><i data-lucide="unplug"></i><span>断开</span></button>
              <button class="button primary" id="connectLiveBtn"><i data-lucide="radio-tower"></i><span>连接直播间</span></button>
            </div>
          </section>
          <section class="form-section">
            <div class="section-heading"><h2>OBS 浏览器源</h2><span class="badge">透明舞台</span></div>
            <label><span>舞台地址</span><div class="input-action"><input id="stageUrl" readonly><button class="icon-button" id="copyStageUrlBtn" title="复制地址" aria-label="复制地址"><i data-lucide="copy"></i></button></div></label>
            <label class="check-row"><span><strong>显示字幕</strong><small>同步角色最后一次回复</small></span><input id="subtitleEnabled" type="checkbox"></label>
            <button class="button secondary" id="previewStageBtn"><i data-lucide="monitor-play"></i><span>预览透明舞台</span></button>
          </section>
        </div>
      </section>

      <section class="view" id="view-privacy">
        <section class="form-section narrow">
          <div class="section-heading"><h2>本地记忆</h2><label class="switch"><input id="memoryEnabled" type="checkbox"><span></span></label></div>
          <label><span>保留消息数</span><input id="maxMessages" type="number" min="4" max="100"></label>
          <label><span>长期笔记</span><textarea id="memoryNotes" rows="7" placeholder="例如偏好、称呼和长期约定"></textarea></label>
          <div class="privacy-strip"><i data-lucide="hard-drive"></i><span>角色、记忆、立绘和加密凭据仅保存在本机。</span></div>
          <div class="form-actions">
            <button class="button danger" id="clearMemoryBtn"><i data-lucide="eraser"></i><span>清除记忆</span></button>
            <button class="button secondary" id="exportDiagnosticsBtn"><i data-lucide="file-down"></i><span>导出脱敏诊断</span></button>
          </div>
        </section>
      </section>
    </main>
  </div>
  <div class="toast" id="toast" role="status"></div>
  <script src="/vendor/lucide.js"></script>
  <script type="module" src="/js/app.js?v=2"></script>
</body>
</html>
